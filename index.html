<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS Health Coach</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    // All JARVIS code goes here as pure JavaScript (no JSX)
    const { useState, useEffect, useRef } = React;
    const e = React.createElement;

    const C={bg:"#03060f",card:"#080f1c",border:"#0e1f35",faint:"#0a1525",accent:"#00e5ff",green:"#39ff6e",orange:"#ff6b35",red:"#ff3333",purple:"#b06eff",text:"#c5dff0",muted:"#2a4a65",soft:"#5a7a95",arc:"#4dd0e1"};
    const TODAY=new Date().toISOString().split("T")[0];

    function JARVIS() {
      const [ready, setReady] = useState(false);
      const [message, setMessage] = useState("JARVIS INITIALIZING...");

      useEffect(() => {
        // Test API connection
        fetch('/api/daily-brief', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({context: {prompt: 'Test'}})
        })
        .then(res => res.json())
        .then(data => {
          setMessage("JARVIS ONLINE ✓");
          setReady(true);
        })
        .catch(err => {
          setMessage("API CONNECTION FAILED - Check Vercel logs");
          console.error(err);
        });
      }, []);

      return e('div', {
        style: {
          background: C.bg,
          minHeight: '100vh',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          flexDirection: 'column',
          fontFamily: 'monospace',
          color: C.text,
          padding: 20
        }
      }, [
        e('div', {
          key: 'title',
          style: {
            fontSize: 32,
            fontWeight: 900,
            color: ready ? C.green : C.accent,
            marginBottom: 20,
            textAlign: 'center'
          }
        }, 'JARVIS'),
        e('div', {
          key: 'status',
          style: {
            fontSize: 12,
            color: ready ? C.green : C.muted,
            letterSpacing: 2,
            marginBottom: 30,
            textAlign: 'center'
          }
        }, message),
        ready && e('div', {
          key: 'info',
          style: {
            maxWidth: 500,
            background: C.card,
            border: `1px solid ${C.border}`,
            borderRadius: 12,
            padding: 20,
            lineHeight: 1.8
          }
        }, [
          e('div', {key: 'line1', style: {fontSize: 14, marginBottom: 15}}, '✅ API Routes Connected'),
          e('div', {key: 'line2', style: {fontSize: 14, marginBottom: 15}}, '✅ Anthropic API Key Configured'),
          e('div', {key: 'line3', style: {fontSize: 14, marginBottom: 15}}, '✅ Ready for Full App Deployment'),
          e('div', {
            key: 'next',
            style: {
              marginTop: 20,
              padding: 15,
              background: `${C.green}15`,
              border: `1px solid ${C.green}40`,
              borderRadius: 8,
              fontSize: 11,
              color: C.text
            }
          }, [
            e('div', {key: 'title', style: {fontWeight: 700, color: C.green, marginBottom: 8}}, 'NEXT STEP:'),
            e('div', {key: 'step'}, 'Replace this index.html with the full JARVIS app code.')
          ])
        ])
      ]);
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(JARVIS));
  </script>
</body>
</html>
